<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#02040a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ANJIZ — Matrix Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <style>
        :root {
            --void: #02040a;
            --deep: #060912;
            --surface: #0d1117;
            --surface-raised: #161b22;
            --surface-hover: #1c2128;
            --surface-active: #21262d;
            --emerald: #00d9a5;
            --emerald-soft: rgba(0, 217, 165, 0.1);
            --emerald-glow: rgba(0, 217, 165, 0.35);
            --sapphire: #58a6ff;
            --sapphire-soft: rgba(88, 166, 255, 0.1);
            --amber: #f0883e;
            --amber-soft: rgba(240, 136, 62, 0.1);
            --ruby: #f85149;
            --ruby-soft: rgba(248, 81, 73, 0.1);
            --violet: #a371f7;
            --violet-soft: rgba(163, 113, 247, 0.1);
            --snow: #f0f6fc;
            --frost: #c9d1d9;
            --mist: #8b949e;
            --slate: #6e7681;
            --stone: #484f58;
            --glass: rgba(13, 17, 23, 0.72);
            --glass-elevated: rgba(22, 27, 34, 0.88);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-border-hover: rgba(255, 255, 255, 0.12);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.5);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.7);
            --shadow-xl: 0 24px 80px rgba(0,0,0,0.8);
            --shadow-glow: 0 0 40px var(--emerald-glow);
            --shadow-ambient: 0 0 120px rgba(0, 217, 165, 0.08);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --duration-instant: 120ms;
            --duration-fast: 250ms;
            --duration-normal: 400ms;
            --duration-slow: 700ms;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-2xl: 36px;
            --radius-full: 9999px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: 'Plus Jakarta Sans', 'Space Grotesk', sans-serif;
            background: var(--void);
            color: var(--snow);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            position: relative;
        }

        /* ═══════════════════════════════════════════════════════════════
           Ambient Background
           ═══════════════════════════════════════════════════════════════ */
        .ambient-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 217, 165, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(88, 166, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 100%, rgba(163, 113, 247, 0.04) 0%, transparent 50%),
                var(--void);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            will-change: transform;
            opacity: 0.6;
        }

        .ambient-orb:nth-child(1) {
            width: 450px; height: 450px;
            background: radial-gradient(circle, var(--emerald-glow), transparent 70%);
            top: -10%; left: -5%;
            animation: orbDrift1 20s ease-in-out infinite;
        }
        .ambient-orb:nth-child(2) {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(88,166,255,0.2), transparent 70%);
            top: 30%; right: -10%;
            animation: orbDrift2 25s ease-in-out infinite reverse;
        }
        .ambient-orb:nth-child(3) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(163,113,247,0.15), transparent 70%);
            bottom: -5%; left: 30%;
            animation: orbDrift3 22s ease-in-out infinite;
            animation-delay: -6s;
        }

        @keyframes orbDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }
        @keyframes orbDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-25px, 20px) scale(1.05); }
            66% { transform: translate(15px, -30px) scale(0.97); }
        }
        @keyframes orbDrift3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, 15px) scale(1.06); }
            66% { transform: translate(-30px, -20px) scale(0.94); }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 70%);
        }

        /* ═══════════════════════════════════════════════════════════════
           App Header
           ═══════════════════════════════════════════════════════════════ */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: calc(var(--safe-top) + var(--space-3)) var(--space-4) var(--space-3);
            transition: all var(--duration-normal) var(--ease-out);
        }

        .app-header.scrolled .header-inner {
            background: rgba(6, 9, 18, 0.82);
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid var(--glass-border-hover);
            box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,0.03);
        }

        .header-inner {
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-xl);
            transition: all var(--duration-normal) var(--ease-out);
            border: 1px solid transparent;
        }

        .brand-mark {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--emerald), #00b894);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--void);
            box-shadow: 0 4px 20px var(--emerald-glow), 0 0 0 1px rgba(0,217,165,0.2);
            transition: all var(--duration-fast) var(--ease-spring);
            position: relative;
            overflow: hidden;
        }

        .brand-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.25) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .brand-mark:active .brand-icon {
            transform: scale(0.92);
        }

        .brand-mark:active .brand-icon::after {
            transform: translateX(100%);
        }

        .brand-wordmark {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--snow) 30%, var(--emerald) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--mist);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-size: 15px;
            position: relative;
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .header-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
            opacity: 0;
            transition: opacity var(--duration-fast);
        }

        .header-btn:hover::before,
        .header-btn:active::before {
            opacity: 1;
        }

        .header-btn:active {
            transform: scale(0.92);
            background: var(--surface-raised);
        }

        .header-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 20px;
            height: 20px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--ruby), #ff6b6b);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            animation: badgeBreathe 2.5s ease-in-out infinite;
            box-shadow: 0 2px 12px rgba(248,81,73,0.5);
            border: 2px solid var(--void);
            z-index: 2;
        }

        @keyframes badgeBreathe {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 12px rgba(248,81,73,0.5); }
            50% { transform: scale(1.15); box-shadow: 0 2px 16px rgba(248,81,73,0.7); }
        }

        /* Focus Mode Button */
        .btn-focus {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--violet), #8b5cf6);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            font-size: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(163,113,247,0.3);
        }

        .btn-focus::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-focus:hover::before {
            transform: translateX(100%);
        }

        .btn-focus:active {
            transform: scale(0.92);
        }

        .btn-focus i {
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════════════════════════════════════
           Main Content
           ═══════════════════════════════════════════════════════════════ */
        .app-main {
            position: relative;
            z-index: 1;
            max-width: 640px;
            margin: 0 auto;
            padding: calc(90px + var(--safe-top)) var(--space-4) calc(140px + var(--safe-bottom));
        }

        /* Greeting */
        .greeting-section {
            margin-bottom: var(--space-6);
            animation: fadeSlideUp 0.8s var(--ease-out) both;
            position: relative;
        }

        .greeting-time {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--emerald);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .greeting-time::before {
            content: '';
            width: 24px;
            height: 2px;
            background: linear-gradient(90deg, var(--emerald), transparent);
            border-radius: 2px;
        }

        .greeting-name {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--snow);
            letter-spacing: -1px;
            line-height: 1.15;
        }

        .greeting-name span {
            background: linear-gradient(135deg, var(--emerald), #00f5c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .greeting-name span::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--emerald), transparent);
            border-radius: 3px;
            opacity: 0.4;
        }

        /* Progress */
        .progress-section {
            display: flex;
            align-items: center;
            gap: var(--space-5);
            margin-bottom: var(--space-6);
            padding: var(--space-5);
            background: linear-gradient(135deg, rgba(13,17,23,0.9), rgba(22,27,34,0.8));
            backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            animation: fadeSlideUp 0.8s var(--ease-out) 0.1s both;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .progress-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--emerald-glow), transparent);
            opacity: 0.6;
        }

        .progress-ring-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 12px var(--emerald-glow));
        }

        .progress-ring-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-ring-track {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 7;
            stroke-linecap: round;
        }

        .progress-ring-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 226.2;
            stroke-dashoffset: 226.2;
            transition: stroke-dashoffset 1.2s var(--ease-out);
            filter: drop-shadow(0 0 6px var(--emerald-glow));
        }

        .progress-ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--emerald);
            text-shadow: 0 0 20px var(--emerald-glow);
        }

        .progress-info {
            flex: 1;
        }

        .progress-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--snow);
            margin-bottom: var(--space-1);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .progress-label i {
            color: var(--emerald);
            font-size: 0.75rem;
        }

        .progress-sublabel {
            font-size: 0.8rem;
            color: var(--slate);
            line-height: 1.5;
        }

        .progress-bar-mini {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            margin-top: var(--space-3);
            overflow: hidden;
            position: relative;
        }

        .progress-bar-mini-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--emerald), #00f5c4);
            border-radius: 4px;
            transition: width 1s var(--ease-out);
            box-shadow: 0 0 10px var(--emerald-glow);
            position: relative;
        }

        .progress-bar-mini-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
            border-radius: 4px;
        }

        /* Quick Add */
        .quick-add-section {
            margin-bottom: var(--space-6);
            animation: fadeSlideUp 0.8s var(--ease-out) 0.15s both;
        }

        .quick-add-card {
            background: linear-gradient(145deg, rgba(13,17,23,0.95), rgba(22,27,34,0.9));
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            position: relative;
            overflow: hidden;
            transition: all var(--duration-normal) var(--ease-out);
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .quick-add-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(135deg, 
                rgba(0,217,165,0.15) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(88,166,255,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .quick-add-card:focus-within {
            border-color: rgba(0,217,165,0.2);
            box-shadow: 0 0 0 4px var(--emerald-soft), var(--shadow-glow), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: var(--space-4);
        }

        .task-input {
            width: 100%;
            padding: var(--space-4) var(--space-4) var(--space-4) 52px;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-lg);
            color: var(--snow);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 500;
            outline: none;
            transition: all var(--duration-normal) var(--ease-out);
        }

        .task-input::placeholder {
            color: var(--stone);
            font-weight: 400;
        }

        .task-input:focus {
            border-color: var(--emerald-glow);
            background: rgba(0,217,165,0.03);
            box-shadow: 0 0 0 4px var(--emerald-soft), 0 0 20px var(--emerald-glow);
        }

        .input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--stone);
            font-size: 18px;
            transition: all var(--duration-fast) var(--ease-out);
            pointer-events: none;
        }

        .task-input:focus ~ .input-icon {
            color: var(--emerald);
            transform: translateY(-50%) scale(1.1);
            filter: drop-shadow(0 0 8px var(--emerald-glow));
        }

        /* Category Selector */
        .category-scroll {
            display: flex;
            gap: var(--space-2);
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            margin-bottom: var(--space-4);
            padding-bottom: var(--space-1);
        }

        .category-scroll::-webkit-scrollbar { display: none; }

        .category-chip {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-full);
            color: var(--mist);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            white-space: nowrap;
            flex-shrink: 0;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .category-chip::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
            opacity: 0;
            transition: opacity var(--duration-fast);
        }

        .category-chip:hover::before {
            opacity: 1;
        }

        .category-chip:active {
            transform: scale(0.95);
        }

        .category-chip.active {
            background: var(--emerald-soft);
            border-color: rgba(0, 217, 165, 0.3);
            color: var(--emerald);
            box-shadow: 0 0 24px var(--emerald-glow), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .category-chip.active .chip-indicator {
            transform: scale(1.3);
            box-shadow: 0 0 12px currentColor;
        }

        .chip-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all var(--duration-fast) var(--ease-spring);
            position: relative;
        }

        .chip-indicator::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.3;
            filter: blur(4px);
        }

        .chip-indicator.do-first { background: #00d9a5; }
        .chip-indicator.schedule { background: #58a6ff; }
        .chip-indicator.delegate { background: #f0883e; }
        .chip-indicator.dont-do { background: #f85149; }

        /* Add Button */
        .btn-add {
            width: 100%;
            padding: var(--space-4);
            background: linear-gradient(135deg, var(--emerald), #00b894);
            border: none;
            border-radius: var(--radius-lg);
            color: var(--void);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            transition: all var(--duration-normal) var(--ease-out);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 24px var(--emerald-glow), 0 0 0 1px rgba(0,217,165,0.2);
            letter-spacing: 0.5px;
        }

        .btn-add::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.8s ease;
        }

        .btn-add:hover::before,
        .btn-add:active::before {
            transform: translateX(100%);
        }

        .btn-add:active {
            transform: scale(0.97);
            box-shadow: 0 2px 12px var(--emerald-glow);
        }

        .btn-add i {
            font-size: 1.1rem;
            transition: transform var(--duration-fast) var(--ease-spring);
        }

        .btn-add:active i {
            transform: rotate(90deg) scale(1.2);
        }

        /* Reminder Toggle */
        .reminder-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) 0 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: var(--space-3);
        }

        .reminder-label {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: 0.88rem;
            color: var(--mist);
            font-weight: 600;
        }

        .reminder-label i {
            color: var(--amber);
            font-size: 14px;
            filter: drop-shadow(0 0 6px rgba(240,136,62,0.4));
        }

        .toggle-switch {
            width: 52px;
            height: 30px;
            background: rgba(255,255,255,0.06);
            border-radius: var(--radius-full);
            position: relative;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            border: 1.5px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, var(--emerald), #00b894);
            border-color: transparent;
            box-shadow: 0 0 20px var(--emerald-glow), inset 0 2px 8px rgba(0,0,0,0.2);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(145deg, #fff, #e2e8f0);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            transition: transform var(--duration-fast) var(--ease-spring);
        }

        .toggle-switch.active::after {
            transform: translateX(22px);
            box-shadow: 0 2px 12px rgba(0,217,165,0.4), 0 0 0 1px rgba(0,217,165,0.2);
        }

        .reminder-fields {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
            padding-top: var(--space-3);
            animation: expandDown 0.4s var(--ease-out);
        }

        .reminder-fields.show {
            display: grid;
        }

        .reminder-field {
            padding: var(--space-3);
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md);
            color: var(--snow);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.88rem;
            outline: none;
            transition: all var(--duration-fast);
        }

        .reminder-field:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px var(--amber-soft), 0 0 12px rgba(240,136,62,0.2);
            background: rgba(240,136,62,0.03);
        }

        @keyframes expandDown {
            from { opacity: 0; transform: translateY(-12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Filters */
        .filter-section {
            margin-bottom: var(--space-6);
            animation: fadeSlideUp 0.8s var(--ease-out) 0.2s both;
        }

        .filter-scroll {
            display: flex;
            gap: var(--space-2);
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: var(--space-1);
        }

        .filter-scroll::-webkit-scrollbar { display: none; }

        .filter-pill {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: rgba(255,255,255,0.02);
            border: 1.5px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-full);
            color: var(--slate);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-out);
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .filter-pill::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
            opacity: 0;
            transition: opacity var(--duration-fast);
        }

        .filter-pill:hover::before {
            opacity: 1;
        }

        .filter-pill:active {
            transform: scale(0.95);
        }

        .filter-pill.active {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border-color: rgba(255,255,255,0.12);
            color: var(--snow);
            box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .filter-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            position: relative;
        }

        .filter-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.25;
            filter: blur(3px);
        }

        .filter-dot.all { background: var(--emerald); }
        .filter-dot.active-tasks { background: var(--amber); }
        .filter-dot.completed { background: var(--sapphire); }
        .filter-dot.do-first { background: #00d9a5; }
        .filter-dot.schedule { background: #58a6ff; }
        .filter-dot.delegate { background: #f0883e; }
        .filter-dot.dont-do { background: #f85149; }

        /* Tasks */
        .tasks-section {
            animation: fadeSlideUp 0.8s var(--ease-out) 0.25s both;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-5);
            padding: 0 var(--space-1);
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--snow);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--emerald), transparent);
            border-radius: 4px;
        }

        .section-count {
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--slate);
            background: rgba(255,255,255,0.04);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            border: 1px solid rgba(255,255,255,0.04);
            font-family: 'IBM Plex Mono', monospace;
        }

        .task-stack {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            padding: var(--space-4);
            background: linear-gradient(145deg, rgba(13,17,23,0.95), rgba(22,27,34,0.85));
            backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            border-left: 3px solid var(--emerald);
            transition: all var(--duration-normal) var(--ease-out);
            position: relative;
            overflow: hidden;
            animation: cardEnter 0.5s var(--ease-out) both;
            box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.02);
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .task-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,217,165,0.02), transparent 50%);
            opacity: 0;
            transition: opacity var(--duration-normal);
            pointer-events: none;
        }

        .task-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--emerald-glow), transparent 60%);
            opacity: 0;
            transition: opacity var(--duration-normal);
        }

        .task-item:active {
            transform: scale(0.98);
        }

        .task-item:hover::before,
        .task-item:active::before {
            opacity: 1;
        }

        .task-item:hover::after,
        .task-item:active::after {
            opacity: 0.5;
        }

        .task-item.do-first { border-left-color: #00d9a5; }
        .task-item.schedule { border-left-color: #58a6ff; }
        .task-item.delegate { border-left-color: #f0883e; }
        .task-item.dont-do { border-left-color: #f85149; }

        .task-item.completed {
            opacity: 0.45;
            border-left-color: var(--stone);
            background: linear-gradient(145deg, rgba(13,17,23,0.7), rgba(22,27,34,0.6));
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--slate);
        }

        .task-check {
            width: 26px;
            height: 26px;
            border-radius: var(--radius-md);
            border: 2.5px solid var(--stone);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all var(--duration-fast) var(--ease-spring);
            color: transparent;
            font-size: 12px;
            position: relative;
            overflow: hidden;
        }

        .task-check::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--emerald);
            opacity: 0;
            transition: opacity var(--duration-fast);
            border-radius: calc(var(--radius-md) - 2px);
        }

        .task-check:active {
            transform: scale(0.85);
        }

        .task-check.checked {
            border-color: var(--emerald);
            background: var(--emerald);
            color: var(--void);
            box-shadow: 0 0 16px var(--emerald-glow), 0 0 0 2px var(--emerald-soft);
        }

        .task-check.checked::before {
            opacity: 1;
        }

        .task-check i {
            position: relative;
            z-index: 1;
            transition: transform var(--duration-fast) var(--ease-spring);
        }

        .task-check.checked i {
            transform: scale(1.2);
        }

        .task-body {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 0.98rem;
            font-weight: 700;
            color: var(--snow);
            margin-bottom: var(--space-2);
            line-height: 1.45;
            word-break: break-word;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .task-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .task-badge.time {
            background: rgba(148,163,184,0.06);
            color: var(--slate);
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            letter-spacing: 0;
            text-transform: none;
        }

        .task-badge.category {
            background: var(--emerald-soft);
            color: var(--emerald);
            box-shadow: 0 0 8px var(--emerald-glow);
        }

        .task-badge.category.schedule { background: var(--sapphire-soft); color: var(--sapphire); box-shadow: 0 0 8px rgba(88,166,255,0.2); }
        .task-badge.category.delegate { background: var(--amber-soft); color: var(--amber); box-shadow: 0 0 8px rgba(240,136,62,0.2); }
        .task-badge.category.dont-do { background: var(--ruby-soft); color: var(--ruby); box-shadow: 0 0 8px rgba(248,81,73,0.2); }

        .task-badge.reminder {
            background: var(--sapphire-soft);
            color: var(--sapphire);
            box-shadow: 0 0 8px rgba(88,166,255,0.15);
        }

        .task-badge.reminder.overdue {
            background: var(--ruby-soft);
            color: var(--ruby);
            box-shadow: 0 0 8px rgba(248,81,73,0.3);
            animation: pulseSoft 2s ease-in-out infinite;
        }

        @keyframes pulseSoft {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(248,81,73,0.3); }
            50% { opacity: 0.7; box-shadow: 0 0 16px rgba(248,81,73,0.5); }
        }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            opacity: 0;
            transform: translateX(10px);
            transition: all var(--duration-fast) var(--ease-out);
        }

        .task-item:active .task-actions,
        .task-item:hover .task-actions {
            opacity: 1;
            transform: translateX(0);
        }

        .task-action {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            color: var(--slate);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            transition: all var(--duration-fast);
            backdrop-filter: blur(8px);
        }

        .task-action:hover {
            background: rgba(255,255,255,0.06);
            color: var(--snow);
            transform: scale(1.1);
        }

        .task-action:active {
            transform: scale(0.9);
        }

        .task-action.delete:hover {
            background: var(--ruby-soft);
            color: var(--ruby);
            border-color: rgba(248,81,73,0.2);
            box-shadow: 0 0 12px rgba(248,81,73,0.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-12) var(--space-6);
            animation: fadeSlideUp 0.8s var(--ease-out) both;
        }

        .empty-illustration {
            width: 140px;
            height: 140px;
            margin: 0 auto var(--space-6);
            border-radius: var(--radius-2xl);
            background: linear-gradient(145deg, var(--surface), var(--surface-raised));
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--stone);
            animation: emptyFloat 5s ease-in-out infinite;
            box-shadow: var(--shadow-lg), 0 0 40px rgba(0,217,165,0.05);
            position: relative;
            overflow: hidden;
        }

        .empty-illustration::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(0,217,165,0.05) 50%, transparent 60%);
            animation: shimmerRotate 4s linear infinite;
        }

        @keyframes shimmerRotate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes emptyFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-16px) rotate(3deg); }
        }

        .empty-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--mist);
            margin-bottom: var(--space-2);
        }

        .empty-desc {
            font-size: 0.92rem;
            color: var(--slate);
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Bottom Dock */
        .app-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: var(--space-3) var(--space-4) calc(var(--space-5) + var(--safe-bottom));
            pointer-events: none;
        }

        .footer-inner {
            max-width: 640px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .footer-dock {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            background: linear-gradient(180deg, rgba(6,9,18,0.95), rgba(13,17,23,0.98));
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-2xl);
            box-shadow: 
                0 -8px 32px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.03),
                0 0 60px rgba(0,217,165,0.04);
            position: relative;
            overflow: hidden;
        }

        .footer-dock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,217,165,0.2), transparent);
            opacity: 0.5;
        }

        .footer-dock::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 40px;
            background: radial-gradient(ellipse 50% 100% at 50% 100%, var(--emerald-glow), transparent 70%);
            opacity: 0.3;
            pointer-events: none;
        }

        .footer-stat {
            text-align: center;
            position: relative;
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-md);
            transition: all var(--duration-fast) var(--ease-out);
            cursor: default;
        }

        .footer-stat:hover {
            background: rgba(255,255,255,0.03);
        }

        .footer-stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--snow);
            line-height: 1;
            transition: all var(--duration-fast);
            text-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .footer-stat-value.pulse {
            animation: statPulse 0.4s var(--ease-spring);
        }

        @keyframes statPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .footer-stat-label {
            font-size: 0.68rem;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
            font-weight: 700;
        }

        .footer-divider {
            width: 1px;
            height: 32px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.08), transparent);
            flex-shrink: 0;
        }

        .footer-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-md);
            transition: all var(--duration-fast);
        }

        .footer-brand:hover {
            background: rgba(255,255,255,0.03);
        }

        .footer-brand-icon {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--emerald), #00b894);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--void);
            box-shadow: 0 2px 12px var(--emerald-glow);
        }

        .footer-brand-text {
            font-size: 0.6rem;
            color: var(--stone);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ═══════════════════════════════════════════════════════════════
           FOCUS MODE OVERLAY — The Killer Feature
           ═══════════════════════════════════════════════════════════════ */
        .focus-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--void);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.6s var(--ease-out);
        }

        .focus-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* Particle Canvas */
        .focus-canvas {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* Focus Content */
        .focus-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: var(--space-6);
            text-align: center;
        }

        /* Close Button */
        .focus-close {
            position: absolute;
            top: calc(var(--safe-top) + var(--space-4));
            right: var(--space-4);
            z-index: 10;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--mist);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all var(--duration-fast) var(--ease-out);
            backdrop-filter: blur(12px);
        }

        .focus-close:hover {
            background: rgba(248,81,73,0.1);
            color: var(--ruby);
            border-color: rgba(248,81,73,0.2);
            transform: rotate(90deg);
        }

        /* Timer */
        .focus-timer-display {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            color: var(--snow);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: var(--space-4);
            text-shadow: 0 0 40px rgba(0,217,165,0.2);
            position: relative;
        }

        .focus-timer-display .timer-colon {
            animation: colonBlink 1s ease-in-out infinite;
            color: var(--emerald);
        }

        @keyframes colonBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .focus-timer-label {
            font-size: 0.85rem;
            color: var(--slate);
            font-weight: 600;

        .focus-btn-primary {

        /* Celebration Canvas */

    <script>
        // ═══════════════════════════════════════════════════════════════
        // ANJIZ Mobile App Logic — 2026 Edition with Focus Mode
        // ═══════════════════════════════════════════════════════════════

        // ── State ──
        let currentCategory = 'do-first';
        let currentFilter = 'all';
        let currentCategoryFilter = null;
        let reminderActive = false;
        let tasks = JSON.parse(localStorage.getItem('anjiz_tasks')) || [];
        let currentUser = null;

        // Focus Mode State
        let focusTimer = null;
        let focusTimeLeft = 25 * 60;
        let focusRunning = false;
        let focusPaused = false;

        // ── DOM ──
        const appHeader = document.getElementById('appHeader');
        const greetingTime = document.getElementById('greetingTime');
        const userName = document.getElementById('userName');
        const taskInput = document.getElementById('taskInput');
        const btnAdd = document.getElementById('btnAdd');
        const categoryChips = document.querySelectorAll('.category-chip');
        const reminderToggle = document.getElementById('reminderToggle');
        const reminderFields = document.getElementById('reminderFields');
        const reminderDate = document.getElementById('reminderDate');
        const reminderTime = document.getElementById('reminderTime');

        const progressFill = document.getElementById('progressFill');

        const progressSublabel = document.getElementById('progressSublabel');
        const progressBarMini = document.getElementById('progressBarMini');

        // Focus Mode DOM
        const focusOverlay = document.getElementById('focusOverlay');
        const focusModeBtn = document.getElementById('focusModeBtn');
        const focusClose = document.getElementById('focusClose');
        const focusTimerDisplay = document.getElementById('focusTimerDisplay');
        const timerMin = document.getElementById('timerMin');
        const timerSec = document.getElementById('timerSec');
        const focusTimerLabel = document.getElementById('focusTimerLabel');
        const focusStartBtn = document.getElementById('focusStartBtn');
        const focusPauseBtn = document.getElementById('focusPauseBtn');
        const focusResetBtn = document.getElementById('focusResetBtn');
        const focusTasks = document.getElementById('focusTasks');
        const focusCanvas = document.getElementById('focusCanvas');
        const celebrationCanvas = document.getElementById('celebrationCanvas');

        // ═══════════════════════════════════════════════════════════════
        // FOCUS MODE — Particle Background & Timer
        // ═══════════════════════════════════════════════════════════════

        // Particle System
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let focusCtx = focusCanvas.getContext('2d');
        let animFrame = null;

        function resizeFocusCanvas() {
            focusCanvas.width = window.innerWidth;
            focusCanvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * focusCanvas.width;
                this.y = Math.random() * focusCanvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2 + 1;
                this.baseColor = Math.random() > 0.5 ? '0, 217, 165' : '88, 166, 255';
                this.alpha = Math.random() * 0.5 + 0.2;
            }

            update() {
                // Mouse attraction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    this.vx += dx * 0.0001;
                    this.vy += dy * 0.0001;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Bounce
                if (this.x < 0 || this.x > focusCanvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > focusCanvas.height) this.vy *= -1;

                // Friction
                this.vx *= 0.99;
                this.vy *= 0.99;
            }

            draw() {
                focusCtx.beginPath();
                focusCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                focusCtx.fillStyle = `rgba(${this.baseColor}, ${this.alpha})`;
                focusCtx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(80, Math.floor((focusCanvas.width * focusCanvas.height) / 8000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        const alpha = (1 - dist / 120) * 0.15;
                        focusCtx.beginPath();
                        focusCtx.moveTo(particles[i].x, particles[i].y);
                        focusCtx.lineTo(particles[j].x, particles[j].y);
                        focusCtx.strokeStyle = `rgba(0, 217, 165, ${alpha})`;
                        focusCtx.lineWidth = 0.5;
                        focusCtx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            focusCtx.clearRect(0, 0, focusCanvas.width, focusCanvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawConnections();
            animFrame = requestAnimationFrame(animateParticles);
        }

        // Focus Mode Events
        focusModeBtn.addEventListener('click', () => {
            focusOverlay.style.display = 'flex';
            setTimeout(() => focusOverlay.classList.add('active'), 10);
            resizeFocusCanvas();
            initParticles();
            animateParticles();
            renderFocusTasks();
        });

        focusClose.addEventListener('click', () => {
            focusOverlay.classList.remove('active');
            setTimeout(() => {
                focusOverlay.style.display = 'none';
                if (animFrame) cancelAnimationFrame(animFrame);
            }, 600);
        });

        focusCanvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        focusCanvas.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('resize', () => {
            if (focusOverlay.classList.contains('active')) {
                resizeFocusCanvas();
                initParticles();
            }
        });

        // Timer Logic
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return {
                min: m.toString().padStart(2, '0'),
                sec: s.toString().padStart(2, '0')
            };
        }

        function updateTimerDisplay() {
            const t = formatTime(focusTimeLeft);
            timerMin.textContent = t.min;
            timerSec.textContent = t.sec;
        }

        function startFocusTimer() {
            if (focusRunning) return;
            focusRunning = true;
            focusPaused = false;
            focusStartBtn.style.display = 'none';
            focusPauseBtn.style.display = 'flex';
            focusTimerLabel.textContent = 'Focusing...';

            focusTimer = setInterval(() => {
                if (focusTimeLeft > 0) {
                    focusTimeLeft--;
                    updateTimerDisplay();
                } else {
                    completeFocusSession();
                }
            }, 1000);
        }

        function pauseFocusTimer() {
            if (!focusRunning) return;
            clearInterval(focusTimer);
            focusRunning = false;
            focusPaused = true;
            focusStartBtn.style.display = 'flex';
            focusStartBtn.innerHTML = '<i class="fas fa-play"></i> Resume';
            focusPauseBtn.style.display = 'none';
            focusTimerLabel.textContent = 'Paused';
        }

        function resetFocusTimer() {
            clearInterval(focusTimer);
            focusRunning = false;
            focusPaused = false;
            focusTimeLeft = 25 * 60;
            updateTimerDisplay();
            focusStartBtn.style.display = 'flex';
            focusStartBtn.innerHTML = '<i class="fas fa-play"></i> Start';
            focusPauseBtn.style.display = 'none';
            focusTimerLabel.textContent = 'Deep Focus Session';
        }

        function completeFocusSession() {
            clearInterval(focusTimer);
            focusRunning = false;
            focusStartBtn.style.display = 'flex';
            focusStartBtn.innerHTML = '<i class="fas fa-play"></i> Start';
            focusPauseBtn.style.display = 'none';
            focusTimerLabel.textContent = 'Session Complete!';
            focusTimerLabel.style.color = 'var(--emerald)';

            // Celebration
            triggerCelebration();

            // Save session
            const sessions = JSON.parse(localStorage.getItem('anjiz_focus_sessions') || '[]');
            sessions.push({
                date: new Date().toISOString(),
                duration: 25
            });
            localStorage.setItem('anjiz_focus_sessions', JSON.stringify(sessions));
        }

        focusStartBtn.addEventListener('click', startFocusTimer);
        focusPauseBtn.addEventListener('click', pauseFocusTimer);
        focusResetBtn.addEventListener('click', resetFocusTimer);

        // Render Focus Tasks
        function renderFocusTasks() {
            const doFirst = tasks.filter(t => t.category === 'do-first' && !t.completed);

            if (doFirst.length === 0) {
                focusTasks.innerHTML = `
                    <div class="focus-tasks-title"><i class="fas fa-bullseye"></i> Priority Tasks</div>
                    <div style="text-align:center; padding: 20px; color: var(--slate); font-size: 0.9rem;">
                        No "Do First" tasks. Add some to focus on!
                    </div>
                `;
                return;
            }

            let html = '<div class="focus-tasks-title"><i class="fas fa-bullseye"></i> Priority Tasks</div>';
            doFirst.forEach(task => {
                html += `
                    <div class="focus-task-item ${task.completed ? 'completed' : ''}" onclick="toggleFocusTask(${task.id})">
                        <div class="focus-task-check ${task.completed ? 'checked' : ''}">
                            <i class="fas fa-check"></i>
                        </div>
                        <div class="focus-task-text">${escapeHtml(task.text)}</div>
                    </div>
                `;
            });
            focusTasks.innerHTML = html;
        }

        window.toggleFocusTask = function(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.completed = !t.completed;
                saveTasks();
                renderTasks();
                renderFocusTasks();
            }
        };

        // ═══════════════════════════════════════════════════════════════
        // CELEBRATION SYSTEM — Confetti Particles
        // ═══════════════════════════════════════════════════════════════

        function triggerCelebration() {
            const ctx = celebrationCanvas.getContext('2d');
            celebrationCanvas.width = window.innerWidth;
            celebrationCanvas.height = window.innerHeight;
            celebrationCanvas.classList.add('active');

            const confetti = [];
            const colors = ['#00d9a5', '#58a6ff', '#f0883e', '#f85149', '#a371f7', '#ffffff'];

            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: celebrationCanvas.width / 2,
                    y: celebrationCanvas.height / 2,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20 - 5,
                    radius: Math.random() * 4 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    gravity: 0.2,
                    drag: 0.98,
                    life: 1
                });
            }

            function animateCelebration() {
                ctx.clearRect(0, 0, celebrationCanvas.width, celebrationCanvas.height);
                let alive = false;

                confetti.forEach(c => {
                    if (c.life > 0) {
                        alive = true;
                        c.x += c.vx;
                        c.y += c.vy;
                        c.vy += c.gravity;
                        c.vx *= c.drag;
                        c.vy *= c.drag;
                        c.rotation += c.rotationSpeed;
                        c.life -= 0.008;

                        ctx.save();
                        ctx.translate(c.x, c.y);
                        ctx.rotate(c.rotation * Math.PI / 180);
                        ctx.globalAlpha = c.life;
                        ctx.fillStyle = c.color;
                        ctx.fillRect(-c.radius, -c.radius / 2, c.radius * 2, c.radius);
                        ctx.restore();
                    }
                });

                if (alive) {
                    requestAnimationFrame(animateCelebration);
                } else {
                    celebrationCanvas.classList.remove('active');
                }
            }

            animateCelebration();
        }

        // ═══════════════════════════════════════════════════════════════
        // CORE APP LOGIC
        // ═══════════════════════════════════════════════════════════════

        // Auth Check
        function checkAuth() {
            const stored = localStorage.getItem('anjiz_user');
            if (!stored) {
                window.location.href = 'login.html';
                return;
            }
            try {
                currentUser = JSON.parse(stored);
                userName.textContent = currentUser.name.split(' ')[0];
            } catch (e) {
                localStorage.removeItem('anjiz_user');
                window.location.href = 'login.html';
            }
        }

        // Greeting Time
        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = 'Good Morning';
            if (hour >= 12) greeting = 'Good Afternoon';
            if (hour >= 17) greeting = 'Good Evening';
            if (hour >= 21) greeting = 'Good Night';
            greetingTime.textContent = greeting;
        }

        // Header Scroll
        window.addEventListener('scroll', () => {
            appHeader.classList.toggle('scrolled', window.scrollY > 10);
        }, { passive: true });

        // Category Selection
        categoryChips.forEach(chip => {
            chip.addEventListener('click', () => {
                categoryChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.category;
            });
        });

        // Reminder Toggle
        reminderToggle.addEventListener('click', () => {
            reminderActive = !reminderActive;
            reminderToggle.classList.toggle('active', reminderActive);
            reminderFields.classList.toggle('show', reminderActive);
            if (reminderActive) {
                const now = new Date();
                const later = new Date(now.getTime() + 60 * 60 * 1000);
                if (!reminderDate.value) reminderDate.value = later.toISOString().split('T')[0];
                if (!reminderTime.value) reminderTime.value = later.toTimeString().slice(0, 5);
            }
        });

        // Add Task
        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;

            const task = {
                id: Date.now(),
                text: text,
                completed: false,
                category: currentCategory,
                createdAt: new Date().toISOString(),
                reminder: null
            };

            if (reminderActive && reminderDate.value && reminderTime.value) {
                const dt = new Date(`${reminderDate.value}T${reminderTime.value}`);
                if (dt > new Date()) {
                    task.reminder = {
                        date: reminderDate.value,
                        time: reminderTime.value,
                        datetime: dt.toISOString(),
                        notified: false
                    };
                }
            }

            tasks.unshift(task);
            saveTasks();
            renderTasks();

            // Reset
            taskInput.value = '';
            taskInput.focus();
            reminderActive = false;
            reminderToggle.classList.remove('active');
            reminderFields.classList.remove('show');
            reminderDate.value = '';
            reminderTime.value = '';
        }

        btnAdd.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') addTask();
        });

        // Render Tasks
        function renderTasks() {
            let filtered = [...tasks];

            if (currentFilter === 'active') filtered = filtered.filter(t => !t.completed);
            else if (currentFilter === 'completed') filtered = filtered.filter(t => t.completed);

            if (currentCategoryFilter) {
                filtered = filtered.filter(t => t.category === currentCategoryFilter);
            }

            taskStack.innerHTML = '';

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                taskStack.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                taskStack.style.display = 'flex';
                filtered.forEach((task, i) => {
                    taskStack.appendChild(createTaskCard(task, i));
                });
            }

            updateStats();
            updateProgress();
        }

        function createTaskCard(task, index) {
            const div = document.createElement('div');
            div.className = `task-item ${task.category} ${task.completed ? 'completed' : ''}`;
            div.style.animationDelay = `${index * 0.06}s`;
            div.dataset.id = task.id;

            const date = new Date(task.createdAt);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });

            const labels = {
                'do-first': 'Do First',
                'schedule': 'Schedule',
                'delegate': 'Delegate',
                'dont-do': "Don't Do"
            };

            let reminderHTML = '';
            if (task.reminder) {
                const rDate = new Date(task.reminder.datetime);
                const now = new Date();
                const isOverdue = rDate < now && !task.reminder.notified;
                const diff = Math.floor((rDate - now) / (1000 * 60));
                let text = isOverdue ? 'Overdue' : diff < 60 ? `${diff}m` : diff < 1440 ? `${Math.floor(diff/60)}h` : `${Math.floor(diff/1440)}d`;
                reminderHTML = `<span class="task-badge reminder ${isOverdue ? 'overdue' : ''}"><i class="fas fa-bell"></i> ${text}</span>`;
            }

            div.innerHTML = `
                <div class="task-check ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
                    <i class="fas fa-check"></i>
                </div>
                <div class="task-body">
                    <div class="task-title">${escapeHtml(task.text)}</div>
                    <div class="task-meta">
                        <span class="task-badge time"><i class="far fa-clock"></i> ${dateStr} · ${timeStr}</span>
                        <span class="task-badge category ${task.category}">${labels[task.category]}</span>
                        ${reminderHTML}
                    </div>
                </div>
                <div class="task-actions">
                    <button class="task-action" onclick="editTask(${task.id})" title="Edit">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="task-action delete" onclick="deleteTask(${task.id})" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;

            return div;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // Task Actions
        window.toggleTask = function(id) {
            const t = tasks.find(x => x.id === id);
            if (t) {
                t.completed = !t.completed;
                saveTasks();
                renderTasks();
                if (focusOverlay.classList.contains('active')) {
                    renderFocusTasks();
                }
            }
        };

        window.editTask = function(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            const newText = prompt('Edit task:', t.text);
            if (newText && newText.trim()) {
                t.text = newText.trim();
                saveTasks();
                renderTasks();
                if (focusOverlay.classList.contains('active')) {
                    renderFocusTasks();
                }
            }
        };

        window.deleteTask = function(id) {
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(x => x.id !== id);
                saveTasks();
                renderTasks();
                if (focusOverlay.classList.contains('active')) {
                    renderFocusTasks();
                }
            }
        };

        // Filters
        filterPills.forEach(pill => {
            pill.addEventListener('click', () => {
                const filter = pill.dataset.filter;
                const cat = pill.dataset.category;

                if (filter) {
                    currentFilter = filter;
                    currentCategoryFilter = null;
                } else if (cat) {
                    currentCategoryFilter = currentCategoryFilter === cat ? null : cat;
                }

                updateFilterPills();
                renderTasks();
            });
        });

        function updateFilterPills() {
            filterPills.forEach(pill => {
                const filter = pill.dataset.filter;
                const cat = pill.dataset.category;
                if (filter) pill.classList.toggle('active', currentFilter === filter && !currentCategoryFilter);
                else if (cat) pill.classList.toggle('active', currentCategoryFilter === cat);
            });
        }

        // Stats with Pulse Animation
        function updateStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.completed).length;
            const active = total - done;

            const statTotal = document.getElementById('statTotal');
            const statActive = document.getElementById('statActive');
            const statDone = document.getElementById('statDone');

            animateValue(statTotal, parseInt(statTotal.textContent), total, 400);
            animateValue(statActive, parseInt(statActive.textContent), active, 400);
            animateValue(statDone, parseInt(statDone.textContent), done, 400);

            document.getElementById('taskCount').textContent = `${total} task${total !== 1 ? 's' : ''}`;
        }

        function animateValue(element, start, end, duration) {
            if (start === end) return;
            const range = end - start;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + range * easeProgress);
                element.textContent = current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    element.classList.add('pulse');
                    setTimeout(() => element.classList.remove('pulse'), 400);
                }
            }
            requestAnimationFrame(update);
        }

        function updateProgress() {
            const total = tasks.length;
            const done = tasks.filter(t => t.completed).length;
            const pct = total > 0 ? Math.round((done / total) * 100) : 0;
            const circumference = 2 * Math.PI * 36;
            const offset = circumference - (pct / 100) * circumference;

            progressFill.style.strokeDashoffset = offset;
            progressText.textContent = pct + '%';
            progressBarMini.style.width = pct + '%';

            if (total === 0) {
                progressSublabel.textContent = 'Start by adding your first task';
            } else if (pct === 100) {
                progressSublabel.textContent = 'All tasks completed! 🎉';
            } else {
                progressSublabel.textContent = `${done} of ${total} tasks done`;
            }
        }

        // Storage
        function saveTasks() {
            localStorage.setItem('anjiz_tasks', JSON.stringify(tasks));
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('anjiz_user');
            window.location.href = 'login.html';
        });

        // Init
        checkAuth();
        setGreeting();
        renderTasks();
    </script>
</body>
</html>
