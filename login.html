<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#050814">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ANJIZ — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --void: #050814;
            --deep: #0a0e1a;
            --surface: #111827;
            --surface-raised: #1a2035;
            --emerald: #10b981;
            --emerald-soft: rgba(16, 185, 129, 0.08);
            --emerald-glow: rgba(16, 185, 129, 0.2);
            --snow: #f8fafc;
            --frost: #e2e8f0;
            --mist: #94a3b8;
            --slate: #64748b;
            --stone: #475569;
            --glass: rgba(17, 24, 39, 0.6);
            --glass-border: rgba(255, 255, 255, 0.04);
            --glass-border-hover: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --shadow-xl: 0 16px 48px rgba(0,0,0,0.6);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --duration-normal: 300ms;
            --duration-slow: 500ms;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--void);
            color: var(--snow);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: var(--safe-top) var(--safe-bottom);
        }

        /* Ambient Background */
        .ambient-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform;
        }

        .ambient-orb:nth-child(1) {
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--emerald-glow), transparent 70%);
            top: -20%; left: -15%;
            animation: orbDrift 20s ease-in-out infinite;
        }

        .ambient-orb:nth-child(2) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 70%);
            bottom: -15%; right: -10%;
            animation: orbDrift 24s ease-in-out infinite reverse;
        }

        .ambient-orb:nth-child(3) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.1), transparent 70%);
            top: 40%; left: 40%;
            animation: orbDrift 18s ease-in-out infinite;
            animation-delay: -6s;
        }

        @keyframes orbDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.05); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: var(--space-6);
            animation: fadeSlideUp 0.7s var(--ease-out) both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Brand */
        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--emerald), #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--void);
            box-shadow: 0 8px 32px var(--emerald-glow);
            animation: iconFloat 3s ease-in-out infinite;
            transition: transform var(--duration-fast) var(--ease-spring);
        }

        .brand-icon:active {
            transform: scale(0.92);
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .brand-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--snow), var(--emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: var(--slate);
            font-weight: 500;
        }

        /* Login Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px 28px;
            position: relative;
            overflow: hidden;
            animation: cardEnter 0.8s var(--ease-spring) 0.1s both;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(135deg, 
                rgba(16, 185, 129, 0.3), 
                transparent 40%, 
                transparent 60%, 
                rgba(59, 130, 246, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--emerald-glow), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--slate);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-wrap {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            color: var(--snow);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all var(--duration-normal) var(--ease-out);
        }

        .form-input::placeholder {
            color: var(--stone);
        }

        .form-input:focus {
            border-color: var(--emerald-glow);
            box-shadow: 0 0 0 3px var(--emerald-soft), 0 0 20px var(--emerald-glow);
            background: var(--surface-raised);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--stone);
            font-size: 16px;
            transition: color var(--duration-fast);
            pointer-events: none;
        }

        .form-input:focus ~ .input-icon {
            color: var(--emerald);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--emerald), #059669);
            border: none;
            border-radius: 14px;
            color: var(--void);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--duration-normal) var(--ease-out);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }

        .btn-submit:active::after {
            left: 100%;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        /* Security Note */
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px 16px;
            background: var(--emerald-soft);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--slate);
        }

        .security-note i {
            color: var(--emerald);
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 14px 20px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s var(--ease-out);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            max-width: 320px;
            width: calc(100% - 48px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-success { border-top: 3px solid var(--emerald); }
        .toast-error { border-top: 3px solid #ef4444; }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
            }
            .brand-title {
                font-size: 2rem;
            }
            .login-card {
                padding: 28px 22px;
                border-radius: 20px;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="ambient-canvas">
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
    </div>

    <div class="login-container">
        <div class="brand-section">
            <div class="brand-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 class="brand-title">ANJIZ</h1>
            <p class="brand-subtitle">Matrix Task Manager</p>
        </div>

        <div class="login-card">
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-wrap">
                        <input type="text" class="form-input" id="userNameInput" placeholder="Enter your name" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email (Optional)</label>
                    <div class="input-wrap">
                        <input type="email" class="form-input" id="userEmailInput" placeholder="your@email.com">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-arrow-right"></i>
                    Get Started
                </button>
            </form>

            <div class="security-note">
                <i class="fas fa-shield-halved"></i>
                <span>Secure & Private</span>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const userNameInput = document.getElementById('userNameInput');
        const userEmailInput = document.getElementById('userEmailInput');

        // Check returning user
        const savedUser = localStorage.getItem('anjiz_user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                userNameInput.value = user.name;
                userEmailInput.value = user.email || '';
            } catch (e) {
                localStorage.removeItem('anjiz_user');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = userNameInput.value.trim();
            const email = userEmailInput.value.trim();

            if (!name) {
                showToast('Please enter your name', 'error');
                return;
            }

            const user = {
                name: name,
                email: email,
                loginDate: new Date().toISOString()
            };

            localStorage.setItem('anjiz_user', JSON.stringify(user));
            showToast(`Welcome, ${name}!`, 'success');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1200);
        });
    </script>
</body>
</html>
